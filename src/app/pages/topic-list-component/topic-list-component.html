<div class="container">
  
  <header class="page-header">
    <a routerLink="/home" class="back-link">Volver al Dashboard</a>
    <h1>Temario</h1>
    <p>Módulos de aprendizaje organizados por nivel.</p>
  </header>

  <div class="tabs-container" *ngIf="selectedCategory$ | async as activeCat">
    <button 
      *ngFor="let cat of categories" 
      class="tab-btn" 
      [class.active]="activeCat === cat"
      (click)="selectCategory(cat)">
      {{ cat }}
    </button>
  </div>

  <div class="topics-grid" *ngIf="filteredTopics$ | async as topics; else loading">
    
    <div *ngIf="topics.length === 0" class="empty-msg">
      No hay temas disponibles en esta categoría.
    </div>

    <div class="topic-card" *ngFor="let topic of topics">
      
      <div class="card-top">
        <div class="title-section">
          <div class="meta-row">
            <span class="category-badge">{{ topic.category }}</span>
            <span class="time-badge">{{ topic.estimatedTime }}</span>
          </div>
          <h3>{{ topic.title }}</h3>
        </div>
      </div>

      <div class="card-body">
        <p>{{ topic.description }}</p>
        
        <div class="tags-row">
          <span class="concept-tag" *ngFor="let tag of topic.tags">#{{ tag }}</span>
        </div>
      </div>

      <div class="card-footer">
        <div class="progress-info">
          <div class="progress-track">
            <div class="progress-fill" [style.width.%]="topic.progress"></div>
          </div>
          <small>{{ topic.progress }}% completado</small>
        </div>

        <button class="btn-view" [routerLink]="['/topics', topic.id]">
          Entrar
        </button>
      </div>

    </div>
  </div>

  <ng-template #loading>
    <div class="loading-state">
      <p>Cargando módulos...</p>
    </div>
  </ng-template>

</div>
