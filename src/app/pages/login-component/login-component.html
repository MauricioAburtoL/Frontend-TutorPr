<div class="login-container">
  <div class="login-card">
    <div class="logo-area">
      <span class="logo-mark">T</span>
      <h2>TutorATS</h2>
    </div>
    <p class="subtitle">Ingresa para continuar</p>

    <form [formGroup]="loginForm" (ngSubmit)="onSubmit()">

      <div class="field">
        <label>Usuario</label>
        <input type="text" formControlName="username" placeholder="tu usuario">
      </div>

      <div class="field">
        <label>Contrasena</label>
        <input type="password" formControlName="password" placeholder="tu contrasena">
      </div>

      <p *ngIf="errorMessage" class="error-msg">{{ errorMessage }}</p>

      <button type="submit" class="btn-submit" [disabled]="isLoading || loginForm.invalid">
        {{ isLoading ? 'Entrando...' : 'Entrar' }}
      </button>
    </form>

    <div class="demo-hint">
      <small>Demo: <code>alumno / 123</code> o <code>profe / 123</code></small>
    </div>
  </div>
</div>
